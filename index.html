<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>少儿国学馆 - 互动古诗乐园</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700;900&family=ZCOOL+KuaiLe&display=swap');
        
        .font-calligraphy {
            font-family: 'Ma Shan Zheng', cursive, serif;
        }
        .font-serif-sc {
            font-family: 'Noto Serif SC', serif;
        }
        .font-child {
            font-family: 'ZCOOL KuaiLe', sans-serif;
        }

        /* 飘落叶子和花瓣的动画 */
        @keyframes float-petal {
            0% {
                transform: translateY(-20px) translateX(0) rotate(0deg) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(105vh) translateX(var(--drift)) rotate(360deg) scale(0.6);
                opacity: 0;
            }
        }
        .bg-petal {
            position: absolute;
            pointer-events: none;
            z-index: 1;
        }

        /* 统一自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-emerald-50 via-teal-50/30 to-amber-50/50 min-h-screen font-sans overflow-x-hidden relative flex flex-col justify-between">

    <!-- 动态花瓣/柳叶背景画布 -->
    <div id="petals-canvas" class="absolute inset-0 overflow-hidden pointer-events-none z-0"></div>

    <!-- 顶部导航和标题 -->
    <header class="text-center pt-10 pb-6 px-4 relative z-10">
        <div class="inline-flex items-center space-x-2 bg-white/80 backdrop-blur-md px-5 py-2 rounded-full border border-stone-200/50 shadow-sm mb-3">
            <span class="text-xl animate-bounce">🌸</span>
            <span class="text-sm font-bold text-emerald-800 font-child">少儿国学馆</span>
            <span class="text-stone-300">|</span>
            <span class="text-xs text-stone-500 font-child">互动古诗系列</span>
        </div>
        <h1 class="text-3xl md:text-5xl font-black text-stone-900 font-calligraphy tracking-wide mb-2 select-none">
            互动古诗乐园
        </h1>
        <p class="text-stone-600 font-child text-sm md:text-base max-w-lg mx-auto">
            这里有许多好玩的古诗魔法画卷！利用上方的搜索栏快速找找你想学习的古诗吧～
        </p>
    </header>

    <!-- 搜索与分类控制区 -->
    <div class="w-full max-w-4xl mx-auto px-6 relative z-10 mb-6">
        <!-- 搜索输入框 -->
        <div class="relative bg-white/90 backdrop-blur-md rounded-2xl shadow-md border border-stone-200/60 p-1.5 flex items-center mb-4 transition-all focus-within:border-emerald-400 focus-within:shadow-lg focus-within:shadow-emerald-100/55">
            <span class="text-xl px-3 text-stone-400">🔍</span>
            <input type="text" id="search-input" placeholder="输入古诗名、作者、朝代或诗句关键字进行检索..." class="w-full bg-transparent border-none outline-none text-stone-700 placeholder-stone-400 font-child py-2 pr-4 text-sm md:text-base">
        </div>

        <!-- 过滤 Tab 标签栏 -->
        <div class="flex flex-wrap justify-between items-center gap-3">
            <div class="flex space-x-2 text-xs md:text-sm font-child">
                <button onclick="changeCategory('all')" id="tab-all" class="px-4 py-1.5 rounded-full bg-emerald-600 text-white font-bold shadow-sm transition-all">
                    全部 <span id="count-all">(0)</span>
                </button>
                <button onclick="changeCategory('unlocked')" id="tab-unlocked" class="px-4 py-1.5 rounded-full bg-white/80 hover:bg-white text-stone-600 font-bold border border-stone-200/50 transition-all">
                    已解锁 <span id="count-unlocked">(0)</span>
                </button>
                <button onclick="changeCategory('locked')" id="tab-locked" class="px-4 py-1.5 rounded-full bg-white/80 hover:bg-white text-stone-600 font-bold border border-stone-200/50 transition-all">
                    即将推出 <span id="count-locked">(0)</span>
                </button>
            </div>
            <!-- 统计文字 -->
            <div class="text-xs text-stone-500 font-child">
                已为您找到 <span id="stats-count" class="text-emerald-600 font-bold text-sm">0 首</span> 古诗
            </div>
        </div>
    </div>

    <!-- 古诗列表主区域 -->
    <main class="w-full max-w-6xl mx-auto px-6 pb-20 relative z-10 flex-1">
        <!-- 紧凑型卡片网格 -->
        <div id="poems-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
            <!-- 动态渲染古诗卡片 -->
        </div>
    </main>

    <!-- 底部页脚 -->
    <footer class="w-full bg-white/60 backdrop-blur-sm border-t border-stone-200/60 py-4 text-center text-stone-500 font-child text-xs relative z-10">
        <p class="mb-0.5">🌸 少儿国学馆 互动古诗魔法屋 © 2026</p>
        <p class="text-[10px] text-stone-400">支持快速检索，自由开启古诗的魔法世界</p>
    </footer>

    <!-- JavaScript 交互与数据渲染 -->
    <script>
        // 核心诗词数据库 (极简结构，后续增加直接在此数组添加对象即可)
        const poems = [
            {
                title: "春夜",
                author: "虞世南",
                dynasty: "唐",
                snippet: "春苑月裴回，竹堂侵夜开。",
                link: "chunye/index.html",
                locked: false,
                theme: "teal"
            },
            {
                title: "春兴",
                author: "武元衡",
                dynasty: "唐",
                snippet: "杨柳阴阴细雨晴，残花落尽见流莺。",
                link: "chunxing/index.html",
                locked: false,
                theme: "emerald"
            },
            {
                title: "春晴",
                author: "王驾",
                dynasty: "唐",
                snippet: "雨前初见花间蕊，雨后兼无叶里花。",
                link: "chunqing/index.html",
                locked: false,
                theme: "lime"
            },
            {
                title: "山房春事",
                author: "岑参",
                dynasty: "唐",
                snippet: "风恬日暖荡春光，戏蝶游蜂乱入房。",
                link: "shanfangchunshi-01/index.html",
                locked: false,
                theme: "orange"
            },
            {
                title: "春晓",
                author: "孟浩然",
                dynasty: "唐",
                snippet: "春眠不觉晓，处处闻啼鸟。",
                link: "#",
                locked: true,
                theme: "amber"
            },
            {
                title: "咏鹅",
                author: "骆宾王",
                dynasty: "唐",
                snippet: "鹅鹅鹅，曲项向天歌。",
                link: "#",
                locked: true,
                theme: "blue"
            },
            {
                title: "静夜思",
                author: "李白",
                dynasty: "唐",
                snippet: "床前明月光，疑是地上霜。",
                link: "#",
                locked: true,
                theme: "indigo"
            },
            {
                title: "江雪",
                author: "柳宗元",
                dynasty: "唐",
                snippet: "千山鸟飞绝，万径人踪灭。",
                link: "#",
                locked: true,
                theme: "slate"
            },
            {
                title: "登鹳雀楼",
                author: "王之涣",
                dynasty: "唐",
                snippet: "白日依山尽，黄河入海流。",
                link: "#",
                locked: true,
                theme: "orange"
            },
            {
                title: "悯农",
                author: "李绅",
                dynasty: "唐",
                snippet: "锄禾日当午，汗滴禾下土。",
                link: "#",
                locked: true,
                theme: "lime"
            }
        ];

        let currentCategory = 'all';

        // 渲染核心逻辑
        function renderPoems(filterText = "", filterType = "all") {
            const grid = document.getElementById('poems-grid');
            grid.innerHTML = "";
            
            const filtered = poems.filter(poem => {
                // 搜索文本过滤 (可匹配：题目、作者、朝代、古诗片段)
                const matchText = filterText.trim().toLowerCase();
                const matchesSearch = !matchText || 
                    poem.title.toLowerCase().includes(matchText) ||
                    poem.author.toLowerCase().includes(matchText) ||
                    poem.dynasty.toLowerCase().includes(matchText) ||
                    poem.snippet.toLowerCase().includes(matchText);
                    
                // 分类过滤
                let matchesCategory = true;
                if (filterType === 'unlocked') {
                    matchesCategory = !poem.locked;
                } else if (filterType === 'locked') {
                    matchesCategory = poem.locked;
                }
                
                return matchesSearch && matchesCategory;
            });

            // 更新搜索统计
            document.getElementById('stats-count').innerText = `${filtered.length} 首`;

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-16 text-center">
                        <span class="text-5xl block mb-3">🔍</span>
                        <p class="text-stone-400 font-child text-base">没有找到相关的古诗哦，换个词试试吧～</p>
                    </div>
                `;
                return;
            }

            // 循环生成卡片
            filtered.forEach(poem => {
                const card = document.createElement('div');
                
                // 配色方案映射
                const themeMap = {
                    teal: { border: 'border-l-4 border-l-teal-500 hover:border-teal-300', bg: 'hover:bg-teal-50/20', text: 'text-teal-900', badge: 'bg-teal-50 text-teal-700 border-teal-100' },
                    emerald: { border: 'border-l-4 border-l-emerald-500 hover:border-emerald-300', bg: 'hover:bg-emerald-50/20', text: 'text-emerald-950', badge: 'bg-emerald-50 text-emerald-700 border-emerald-100' },
                    amber: { border: 'border-l-4 border-l-amber-500 hover:border-amber-300', bg: 'hover:bg-amber-50/20', text: 'text-amber-900', badge: 'bg-amber-50 text-amber-700 border-amber-100' },
                    blue: { border: 'border-l-4 border-l-blue-500 hover:border-blue-300', bg: 'hover:bg-blue-50/20', text: 'text-blue-900', badge: 'bg-blue-50 text-blue-700 border-blue-100' },
                    indigo: { border: 'border-l-4 border-l-indigo-500 hover:border-indigo-300', bg: 'hover:bg-indigo-50/20', text: 'text-indigo-900', badge: 'bg-indigo-50 text-indigo-700 border-indigo-100' },
                    slate: { border: 'border-l-4 border-l-slate-500 hover:border-slate-300', bg: 'hover:bg-slate-50/20', text: 'text-slate-900', badge: 'bg-slate-50 text-slate-700 border-slate-100' },
                    orange: { border: 'border-l-4 border-l-orange-500 hover:border-orange-300', bg: 'hover:bg-orange-50/20', text: 'text-orange-950', badge: 'bg-orange-50 text-orange-700 border-orange-100' },
                    lime: { border: 'border-l-4 border-l-lime-500 hover:border-lime-300', bg: 'hover:bg-lime-50/20', text: 'text-lime-900', badge: 'bg-lime-50 text-lime-700 border-lime-100' }
                };
                
                const style = themeMap[poem.theme] || { border: 'border-l-4 border-l-stone-400', bg: 'hover:bg-stone-50', text: 'text-stone-900', badge: 'bg-stone-50 text-stone-600' };

                if (poem.locked) {
                    // 未解锁卡片样式
                    card.className = `relative overflow-hidden bg-white/40 backdrop-blur border border-stone-200/50 shadow-sm rounded-2xl p-4 flex flex-col justify-between h-32 transition-all duration-200 opacity-60 group`;
                    card.innerHTML = `
                        <div class="absolute inset-0 bg-stone-100/30 backdrop-blur-[0.5px] z-10 flex items-center justify-center">
                            <div class="bg-white/95 rounded-full p-2 shadow border border-stone-200 group-hover:scale-105 transition-transform duration-200">
                                <span class="text-xs">🔒</span>
                            </div>
                        </div>
                        <div class="flex justify-between items-start">
                            <span class="text-[10px] text-stone-400 font-child bg-stone-100 px-2 py-0.5 rounded border border-stone-200">[${poem.dynasty}] ${poem.author}</span>
                        </div>
                        <h3 class="text-lg font-black text-stone-500 font-serif-sc mt-1">《${poem.title}》</h3>
                        <p class="text-stone-400 font-child text-[10px] truncate mt-1">${poem.snippet}</p>
                    `;
                } else {
                    // 已解锁卡片样式（可点击）
                    card.className = `bg-white/90 backdrop-blur border border-white/60 shadow rounded-2xl p-4 flex flex-col justify-between h-32 cursor-pointer hover:-translate-y-1 hover:shadow-md transition-all duration-200 group ${style.border} ${style.bg}`;
                    card.onclick = () => {
                        window.location.href = poem.link;
                    };
                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <span class="text-[10px] font-bold font-child px-2 py-0.5 rounded-full border ${style.badge}">[${poem.dynasty}] ${poem.author}</span>
                            <span class="text-[9px] text-emerald-600 font-child bg-emerald-50 border border-emerald-100/50 px-1.5 py-0.2 rounded-md">已解锁</span>
                        </div>
                        <h3 class="text-lg font-black ${style.text} font-serif-sc mt-1 group-hover:text-emerald-700 transition-colors">《${poem.title}》</h3>
                        <p class="text-stone-500 font-child text-[11px] truncate mt-1">${poem.snippet}</p>
                        <div class="flex justify-end items-center mt-1 text-[10px] text-emerald-600 font-bold font-child opacity-80 group-hover:opacity-100 transition-opacity">
                            <span>点击学习 ➔</span>
                        </div>
                    `;
                }
                grid.appendChild(card);
            });
        }

        // 切换过滤类别
        function changeCategory(cat) {
            currentCategory = cat;
            const tabs = ['all', 'unlocked', 'locked'];
            tabs.forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (t === cat) {
                    btn.className = "px-4 py-1.5 rounded-full bg-emerald-600 text-white font-bold shadow-sm transition-all";
                } else {
                    btn.className = "px-4 py-1.5 rounded-full bg-white/80 hover:bg-white text-stone-600 font-bold border border-stone-200/50 transition-all";
                }
            });
            
            const searchVal = document.getElementById('search-input').value;
            renderPoems(searchVal, cat);
        }

        // 更新标签数统计
        function updateTabCounts() {
            const total = poems.length;
            const unlocked = poems.filter(p => !p.locked).length;
            const locked = poems.filter(p => p.locked).length;
            
            document.getElementById('count-all').innerText = `(${total})`;
            document.getElementById('count-unlocked').innerText = `(${unlocked})`;
            document.getElementById('count-locked').innerText = `(${locked})`;
        }

        // 初始化搜索框输入事件监听
        document.getElementById('search-input').addEventListener('input', (e) => {
            renderPoems(e.target.value, currentCategory);
        });

        // 飘落花瓣柳叶背景装饰
        function createDecoPetals() {
            const canvas = document.getElementById('petals-canvas');
            const maxPetals = 20;
            
            for (let i = 0; i < maxPetals; i++) {
                setTimeout(() => {
                    const petal = document.createElement('div');
                    const isLeaf = Math.random() > 0.5;
                    const size = Math.random() * 10 + 10; // 10px - 20px
                    
                    petal.className = 'bg-petal';
                    petal.style.width = `${size}px`;
                    petal.style.height = `${size}px`;
                    petal.style.left = `${Math.random() * 100}vw`;
                    petal.style.top = `-30px`;
                    
                    if (isLeaf) {
                        petal.style.background = 'linear-gradient(135deg, #a7f3d0, #34d399)';
                        petal.style.borderRadius = '20px 0 20px 0';
                    } else {
                        petal.style.background = 'linear-gradient(135deg, #fbcfe8, #f472b6)';
                        petal.style.borderRadius = '15px 0 15px 0';
                    }
                    
                    const duration = Math.random() * 8 + 8; // 8s - 16s
                    const drift = Math.random() * 200 - 100;
                    
                    petal.style.setProperty('--drift', `${drift}px`);
                    petal.style.animation = `float-petal ${duration}s linear infinite`;
                    petal.style.animationDelay = `${Math.random() * 12}s`;
                    
                    canvas.appendChild(petal);
                }, i * 350);
            }
        }

        // 初始化启动
        window.addEventListener('DOMContentLoaded', () => {
            updateTabCounts();
            renderPoems();
            createDecoPetals();
        });
    </script>
</body>
</html>
